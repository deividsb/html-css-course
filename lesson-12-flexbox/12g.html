<!DOCTYPE html>
<html>
  <head>
    <title>
      Flexbox Exercise G
    </title>
    <link rel="stylesheet" href="12g.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="profiles">
      <div class="profile">
        <div class="profile-photo">

          <img class="avatar" src="avatars/oliver.avif">

        </div>
        <div class="profile-info">
          <div class="profile-name">
            
              oliver

          </div>
          <div class="profile-name-2">

              the cat

          </div>
          <div class="profile-status">
            
              Popular

          </div>
        </div>
        <div class="follow">

          <button class="follow-btn">
            Follow
          </button>

        </div>
      </div>
      <div class="profile">
        <div class="profile-photo">

          <img class="avatar" src="avatars/mimi.avif">

        </div>
        <div class="profile-info">
          <div class="profile-name">
            
              Mimi

          </div>
          <div class="profile-name-2">

              Sleepy Cat

          </div>
          <div class="profile-status">
            
              Popular

          </div>
        </div>
        <div class="following">

          <button class="following-btn">
            Following
          </button>

        </div>
      </div>
      <div class="profile">
        <div class="profile-photo">

          <img class="avatar" src="avatars/rex.avif">

        </div>
        <div class="profile-info">
          <div class="profile-name">
            
              Rex

          </div>
          <div class="profile-name-2">

              Stylish Cat

          </div>
          <div class="profile-status">
            
              Popular

          </div>
        </div>
        <div class="follow">

          <button class="follow-btn">
            Follow
          </button>

        </div>
      </div>
    </div>
  </body>
</html>
