<!DOCTYPE html>
<html>
  <head>
    <title>
      Google Clone
    </title>
    <style>
      .logo {
        text-align: center;
      }

      .img-google {
        width: 500px;
        margin: 0 0;
      }

      .search {
        text-align: center;
      }

      .search-field {
        width: 700px;
        line-height: 45px;
        font-size: 20px;
        padding: 0 20px;
        border-radius: 30px;
        border: none;
        box-shadow: 0 0 5px grey;
        margin: none;
      }

      .buttons {
        text-align: center;
      }

      .btn-search {
        padding: 12px 24px;
        background-color: rgb(242, 242, 242);
        border: none;
        font-size: 18px;
        margin: 40px 0;
        cursor: pointer;
        transition: box-shadow 0.15s;
      }

      .btn-search:hover {
        box-shadow: 0 0 3px black;
      }
    </style>
  </head>
  <body>
    <div class="logo">

      <img class="img-google" src="google.png">

    </div>
    <div class="search">

      <input class="search-field" type="text" placeholder="Search Google or type a URL">

    </div>
    <div class="buttons">

      <button class="btn-search">
        Google Search
      </button>

      <button class="btn-search">
        I'm Feeling Lucky
      </button>

    </div>
  </body>
</html>
