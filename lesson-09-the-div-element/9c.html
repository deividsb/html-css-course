<!DOCTYPE html>
<html>
  <head>
    <title>
      Survey
    </title>
    <style>
      .survey {
        width: 260px;
        border: 1px solid gray;
      }

      .question {
        margin: 15px 0 0 15px;
      }

      .btn {
        margin: 15px 0 15px 15px;
      }
    </style>
  </head>
  <body>
    <div class="survey">

      <p class="question">
        Satisfied with our service?
      </p>

      <button class="btn">
        Yes
      </button>

      <button class="btn">
        No
      </button>

    </div>
  </body>
</html>
