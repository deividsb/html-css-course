<!DOCTYPE html>
<html>
  <head>
    <title>
      Friend Suggestions
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      .user-mini {
        width: 200px;
        box-shadow: 0 0 5px gray;
        display: inline-block;
        margin: 10px 10px;
      }

      .user-avatar {
        width: 200px;
        height: 200px;
        object-fit: cover;
        margin: 0;
      }

      .user-name {
        font-weight: bold;
        font-size: 22px;
        font-family: Roboto Mono;
        margin: 5px 0 0 10px;
      }

      .mutual-friends {
        font-family: Roboto Mono;
        font-size: 15px;
        margin: 5px 0 0 10px;
        color: gray;
      }

      .btn-add-friend {
        font-family: Roboto Mono;
        margin: 10px;
        border: none;
        background-color: rgb(13, 121, 229);
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 18px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="user-mini">

      <img class="user-avatar" src="avatars/oliver.avif">

      <p class="user-name">
        Oliver
      </p>

      <p class="mutual-friends">
        2 mutual friends
      </p>

      <button class="btn-add-friend">
        Add friend
      </button>

    </div>
    <div class="user-mini">

      <img class="user-avatar" src="avatars/mimi.avif">

      <p class="user-name">
        Mimi
      </p>

      <p class="mutual-friends">
        4 mutual friends
      </p>

      <button class="btn-add-friend">
        Add friend
      </button>

    </div>
    <div class="user-mini">

      <img class="user-avatar" src="avatars/rex.avif">

      <p class="user-name">
        Rex
      </p>

      <p class="mutual-friends">
        3 mutual friends
      </p>

      <button class="btn-add-friend">
        Add friend
      </button>

    </div>
  </body>
</html>
