<!DOCTYPE html>
<html>
  <head>
    <title>
      Google Clone
    </title>
    <style>
      .img-google {
        width: 500px;
        display: block;
        margin: auto;
      }

      .search-field {
        width: 700px;
        display: block;
        margin: auto;
        line-height: 45px;
        font-size: 20px;
        padding: 0 20px;
        border-radius: 30px;
        border: none;
        box-shadow: 0 0 5px grey;
      }
    </style>
  </head>
  <body>
    <img class="img-google" src="google.png">

    <input class="search-field" type="text" placeholder="Search Google or type a URL">
  </body>
</html>
