<!DOCTYPE html>
<html>
  <head>
    <title>
      Same-line
    </title>
    <style>
      .paragraph {
        width: 200px;
        display: inline-block;
        vertical-align: middle;
      }

      .answer {
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <p class="paragraph">
      Thanks for chatting with our customer support. Would you like to take our quick survey?
    </p>

    <button class="answer">
      Yes
    </button>

    <button class="answer">
      No
    </button>
  </body>
</html>
