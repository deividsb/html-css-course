<!DOCTYPE html>
<html>
  <head>
    <title>
      Uber Clone
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: Rubik;
      }

      .text {
        font-size: 27px;
        margin: 10px auto;
      }

      .pickup-destination {
        display: block;
        margin: 7px 0;
        width: 240px;
        padding: 7px 15px;
        background-color: rgb(240, 240, 240);
        border: none;
        border-radius: 5px;
      }

      .request-now {
        background-color: black;
        color: white;
        border: none;
        padding: 10px 20px;
      }

      .for-later {
        background-color: lightgray;
        border: none;
        margin: 10px 10px;
        padding: 10px 15px;
      }
    </style>
  </head>
  <body>
    <p class="text">
      Request a ride now
    </p>

    <input class="pickup-destination" type="text" placeholder="Enter pickup location">

    <input class="pickup-destination" type="text" placeholder="Enter destination">

    <button class="request-now">
      Request now
    </button>

    <button class="for-later">
      Schedule for later
    </button>
  </body>
</html>
