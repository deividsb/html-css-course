<!DOCTYPE html>
<html>
  <head>
    <title>
      Sign up form
    </title>
    <style>
      .name-surname {
        display: inline-block;
        padding: 9px 10px;
        width: 100px;
        margin: 5px 2px;
        border-radius: 5px;
        border: 1px solid lightgray;
      }

      .e-mail {
        display: block;
        margin: 5px 2px;
        width: 233px;
        padding: 9px 10px;
        border-radius: 5px;
        border: 1px solid lightgray;
      }

      .sign-up {
        margin: 5px 2px;
        width: 255px;
        padding: 9px 10px;
        border-radius: 5px;
        border: none;
        background-color: rgb(10, 102, 194);
        color: white;
        font-weight: bold;
        line-height: 20px;
      }
    </style>
  </head>
  <body>
    <input class="name-surname" type="text" placeholder="First name">

    <input class="name-surname" type="text" placeholder="Last name">

    <input class="e-mail" type="text" placeholder="Email">

    <button class="sign-up">
      Sign Up
    </button>
  </body>
</html>
