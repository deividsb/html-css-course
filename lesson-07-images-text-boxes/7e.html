<!DOCTYPE html>
<html>
  <head>
    <title>
      Shadow
    </title>
    <style>
      .searchbox {
        width: 400px;
        line-height: 27px;
        padding-left: 15px;
        border: none;
        border-radius: 15px;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body>
    <input class="searchbox" type="text" placeholder="Search Google or type a URL">
  </body>
</html>
