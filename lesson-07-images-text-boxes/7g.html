<!DOCTYPE html>
<html>
  <head>
    <title>
      Cat tweets
    </title>
    <style>
      .cat {
        width: 50px;
        height: 50px;
        object-fit: cover;
        border-radius: 50px;
        vertical-align: middle;
      }

      .whats-happening {
        vertical-align: middle;
        border: none;
        color: grey;
        padding: 10px;
      }

      .btn-tweet {
        vertical-align: middle;
        background-color: rgb(29, 155, 240);
        color: white;
        border: none;
        font-weight: bold;
        padding: 6px 12px;
        border-radius: 20px;
      }
    </style>
  </head>
  <body>
    <img class="cat" src="cat.avif">

    <input class="whats-happening" type="text" placeholder="What's happening?">

    <button class="btn-tweet">
      Tweet
    </button>
  </body>
</html>
