<!DOCTYPE html>
<html>
  <head>
    <title>
      LinkedIn Signup clone
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: Roboto;
      }

      .email-txt {
        margin-top: 5px;
        color: grey;
        margin-bottom: 0;
        font-size: 12px;
      }

      .email {
        margin-top: 7px;
        border: 1px solid black;
        width: 290px;
        border-radius: 3px;
        line-height: 21px;
      }

      .terms {
        font-size: 12px;
        color: grey;
      }

      .btn-agree {
        width: 295px;
        border-radius: 30px;
        line-height: 30px;
        border: none;
        background-color: rgb(10, 102, 194);
        color: white;
        padding: 4px 0;
      }
    </style>
  </head>
  <body>
    <p class="email-txt">
      Email
    </p>

    <input class="email" type="text">

    <p class="terms">
      By clicking Agree & Join, you agree to the Privacy Policy.
    </p>

    <button class="btn-agree">
      Agree & Join
    </button>
  </body>
</html>
