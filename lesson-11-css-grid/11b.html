<!DOCTYPE html>
<html>
  <head>
    <title>
      Grid Practice
    </title>
    <style>
      .grid-columns {
        display: grid;
        grid-template-columns: 50px 1fr 75px;
      }

      .blue {
        background-color: lightblue;
      }

      .pink {
        background-color: lightpink;
      }
    </style>
  </head>
  <body>
    <div class="grid-columns">
      <div class="blue">

        col1

      </div>
      <div class="pink">

        col2

      </div>
      <div class="blue">

        col3

      </div>
    </div>
  </body>
</html>
