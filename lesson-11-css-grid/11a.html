<!DOCTYPE html>
<html>
  <head>
    <title>
      Grid Practice
    </title>
    <style>
      .grid-test {
        display: grid;
        grid-template-columns: 200px 75px;
      }

      .blue {
        background-color: lightblue;
      }

      .pink {
        background-color: lightpink;
      }
    </style>
  </head>
  <body>
    <div class="grid-test">
      <div class="blue">

        200px
  
      </div>
      <div class="pink">
  
        75px
  
      </div>
    </div>
  </body>
</html>
