<!DOCTYPE html>
<html>
  <head>
    <title>
      Friend Suggestions
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      .user-mini {
        width: 200px;
        box-shadow: 0 0 5px gray;
        display: inline-block;
        margin: 10px 10px;
      }

      .user-avatar {
        width: 200px;
        height: 200px;
        object-fit: cover;
        margin: 0;
      }

      .user-name {
        font-weight: bold;
        font-size: 22px;
        font-family: Roboto Mono;
        margin: 5px 0 0 10px;
      }

      .mutual-friend-of-div, .mutual-friends-how-many-div {
        display: inline-block;
      }

      .mutual-friend-of {
        width: 28px;
        height: 28px;
        object-fit: cover;
        border-radius: 28px;
        margin-left: 10px;
        vertical-align: middle;
      }

      .mutual-friends-how-many {
        font-family: Roboto Mono;
        font-size: 13px;
        margin: 5px 0 0 5px;
        color: gray;
      }

      .btn-add-friend {
        font-family: Roboto Mono;
        margin: 10px;
        border: none;
        background-color: rgb(13, 121, 229);
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="user-mini">
      <div class="user-avatar-div">

        <img class="user-avatar" src="avatars/oliver.avif">

      </div>
      <div class="user-name-div">

        <p class="user-name">
          Oliver
        </p>

      </div>
      <div>
        <div class="mutual-friend-of-div">

          <img class="mutual-friend-of" src="avatars/falafel.avif">

        </div>
        <div class="mutual-friends-how-many-div">

          <p class="mutual-friends-how-many">
            2 mutual friends
          </p>

        </div>
      </div>
      <div class="btn-add-friend-div">

        <button class="btn-add-friend">
          Add friend
        </button>

      </div>
    </div>
    <div class="user-mini">
      <div class="user-avatar-div">

        <img class="user-avatar" src="avatars/mimi.avif">

      </div>
      <div class="user-name-div">

        <p class="user-name">
          Mimi
        </p>

      </div>
      <div>
        <div class="mutual-friend-of-div">

          <img class="mutual-friend-of" src="avatars/falafel.avif">

        </div>
        <div class="mutual-friends-how-many-div">

          <p class="mutual-friends-how-many">
            4 mutual friends
          </p>

        </div>
      </div>
      <div class="btn-add-friend-div">

        <button class="btn-add-friend">
          Add friend
        </button>

      </div>
    </div>
    <div class="user-mini">
      <div class="user-avatar-div">

        <img class="user-avatar" src="avatars/rex.avif">

      </div>
      <div class="user-name-div">

        <p class="user-name">
          Rex
        </p>

      </div>
      <div>
        <div class="mutual-friend-of-div">

          <img class="mutual-friend-of" src="avatars/falafel.avif">

        </div>
        <div class="mutual-friends-how-many-div">

          <p class="mutual-friends-how-many">
            3 mutual friends
          </p>

        </div>
      </div>
      <div class="btn-add-friend-div">

        <button class="btn-add-friend">
          Add friend
        </button>

      </div>
    </div>
  </body>
</html>
